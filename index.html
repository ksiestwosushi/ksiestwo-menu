      -moz-user-drag: none;

    let currentLang = 'pl';
    let isMenuExpanded = false;
    let savedScrollPosition = 0;

    function initApp() {
      setTimeout(() => {
        const intro = document.getElementById('intro');
        if (intro) {
          intro.style.opacity = '0';
          setTimeout(() => {
              intro.style.display = 'none';
              const langSel = document.getElementById('lang-select');
              if (langSel) {
                langSel.style.pointerEvents = 'auto';
                langSel.style.opacity = '1';
              }
          }, 1000);
        }
      }, 1500);

      const trigger = document.getElementById('menu-trigger');
      const closeBtn = document.getElementById('close-menu');
      const overlay = document.getElementById('menu-overlay');

      setMenuState(false);

      if (trigger) {
        trigger.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          if(!isMenuExpanded) toggleMenu(true);
        });
      }

      if (closeBtn) {
        closeBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleMenu(false);
        });
      }

      window.scrollToSection = function(id) {
          if(isMenuExpanded) toggleMenu(false);
          
          setTimeout(() => {
              const el = document.getElementById(id);
              if(el) {
                  const yOffset = -80; 
                  const y = el.getBoundingClientRect().top + window.pageYOffset + yOffset;
                  document.documentElement.style.scrollBehavior = 'smooth';
                  window.scrollTo({top: y, behavior: 'smooth'});
                  
                  setTimeout(() => { document.documentElement.style.scrollBehavior = ''; }, 1000);
              }
          }, 100);
      };

      window.setLanguage = function(lang) {
          currentLang = lang;
          const langSel = document.getElementById('lang-select');
          langSel.style.opacity = '0';
          setTimeout(() => {
            langSel.style.display = 'none';
            const app = document.getElementById('app');
            app.classList.remove('hidden');
            requestAnimationFrame(() => app.classList.remove('opacity-0'));
            renderApp();
          }, 700);
      };

      window.switchLang = function(lang) {
          currentLang = lang;
          renderApp();
      };

      window.openInfoModal = function() {
          const modal = document.getElementById('info-modal');
          const content = document.getElementById('info-modal-content');
          modal.classList.remove('hidden');
          requestAnimationFrame(() => {
              modal.classList.remove('opacity-0');
              content.classList.remove('scale-95');
          });
          document.getElementById('modal-title').textContent = ALLERGIES.title[currentLang];
          document.getElementById('modal-text').textContent = ALLERGIES.text[currentLang];
          document.getElementById('modal-service').textContent = ALLERGIES.service[currentLang];
      };

      window.closeInfoModal = function() {
          const modal = document.getElementById('info-modal');
          const content = document.getElementById('info-modal-content');
          modal.classList.add('opacity-0');
          content.classList.add('scale-95');
          setTimeout(() => modal.classList.add('hidden'), 500);
      };

      window.toggleItem = function(el) {
        const content = el.nextElementSibling;
        const arrow = el.querySelector('.arrow');
        const title = el.querySelector('.item-title');
        const isOpening = !content.style.maxHeight;

        const allContents = document.querySelectorAll('.set-item-content');
        allContents.forEach(c => {
             c.style.maxHeight = null;
             c.classList.remove('opacity-100', 'pb-8');
             c.classList.add('opacity-0');
             const header = c.previousElementSibling;
             if(header) {
                 const hArrow = header.querySelector('.arrow');
                 const hTitle = header.querySelector('.item-title');
                 if(hArrow) hArrow.classList.remove('rotate-180', 'text-gold');
                 if(hTitle) hTitle.classList.remove('text-gold-dark');
             }
        });

        if (isOpening) {
            content.style.maxHeight = content.scrollHeight + "px";
            content.classList.remove('opacity-0');
            content.classList.add('opacity-100', 'pb-8');
            arrow.classList.add('rotate-180', 'text-gold');
            title.classList.add('text-gold-dark');
        }
      };
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initApp);
    } else {
      initApp();
    }

    window.toggleMenu = function(expand) {
        isMenuExpanded = expand;
        setMenuState(expand);
    };

    function setMenuState(expanded) {
        const panel = document.getElementById('menu-panel');
        const trigger = document.getElementById('menu-trigger');
        const content = document.getElementById('menu-content');
        const overlay = document.getElementById('menu-overlay');

        if(expanded) {
            if (overlay) {
              overlay.style.opacity = '1';
              overlay.style.pointerEvents = 'auto';
            }

            savedScrollPosition = window.pageYOffset; 
            document.body.style.position = 'fixed';
            document.body.style.top = '-' + savedScrollPosition + 'px';
            document.body.style.width = '100%';

            const safeHeight = Math.min(window.innerHeight * 0.85, 600);
            const safeWidth = Math.min(window.innerWidth * 0.9, 380);

            if (panel) {
              panel.style.width = safeWidth + 'px';
              panel.style.height = safeHeight + 'px';
              panel.style.borderRadius = '24px'; 
            }
            
            if (trigger) {
              trigger.style.opacity = '0';
              trigger.style.pointerEvents = 'none';
            }
            
            if (content) {
              content.style.opacity = '1';
              content.style.pointerEvents = 'auto';
            }
        } else {
            if (overlay) {
              overlay.style.opacity = '0';
              overlay.style.pointerEvents = 'none';
            }

            document.body.style.position = '';
            document.body.style.top = '';
            document.body.style.width = '';
            
            document.documentElement.style.scrollBehavior = 'auto';
            window.scrollTo(0, savedScrollPosition);
            document.documentElement.style.scrollBehavior = '';

            if (panel) {
              panel.style.width = '60px';
              panel.style.height = '60px';
              panel.style.borderRadius = '30px'; 
            }
            
            if (trigger) {
              trigger.style.opacity = '1';
              trigger.style.pointerEvents = 'auto';
            }
            
            if (content) {
              content.style.opacity = '0';
              content.style.pointerEvents = 'none';
            }
        }
    }

    function renderApp() {
        document.getElementById('hero-subtitle').textContent = UI_TEXT.hero_subtitle[currentLang];
        document.getElementById('hero-btn').textContent = UI_TEXT.explore_btn[currentLang];

        } else {
            enBtns.forEach(b => { b.classList.add('bg-gold', 'text-ink'); b.classList.remove('text-white/60'); });

        }

        const menuList = document.getElementById('menu-list');
        menuList.innerHTML = _0x4f21.map((s, idx) => `
            <button onclick="scrollToSection('${s.id}')" class="text-left px-5 py-3.5 rounded-xl bg-white/5 hover:bg-gold/20 hover:text-gold transition-all duration-300 font-rajdhani text-sm uppercase tracking-widest text-white group flex items-center justify-between">
                <span>${s.title[currentLang]}</span>

        const main = document.getElementById('main-content');
        const sectionsHTML = _0x4f21.map((section, idx) => {

            const renderItem = (item, dark = false) => {
                if(isSets) {
                    return `

                                    ${UI_TEXT.description_label[currentLang]}

                                <p class="font-rajdhani text-gray-600 text-lg md:text-xl leading-relaxed whitespace-pre-line font-medium">
                                    ${item.desc[currentLang]}
                                </p>
                            </div>
                        </div>
                    </div>`;
                } else {
                    return `
                    <div class="py-6 border-b ${dark ? 'border-white/10 hover:bg-white/5' : 'border-gray-100 hover:bg-gray-50/50'} last:border-0 group transition-colors px-4 -mx-4 rounded-xl">
                        <div class="flex justify-between items-baseline gap-4 mb-2">
                            <h3 class="font-cinzel text-xl ${dark ? 'text-white group-hover:text-gold' : 'text-ink group-hover:text-gold-dark'} font-extrabold transition-colors tracking-wide">
                                ${item.name[currentLang]}
                            </h3>
                            <span class="font-rajdhani font-bold ${dark ? 'text-gold' : 'text-gold-dark'} text-lg whitespace-nowrap">

                            ${item.desc[currentLang]}
                        </p>
                    </div>`;
                }
            };

            if (isSpecials) {
                return `
                <section id="${section.id}" class="w-full relative z-30 pt-10 pb-32 px-6">
                    <div class="max-w-4xl mx-auto text-center mb-16">
                        <div class="flex items-center justify-center gap-4 mb-6">
                            <div class="h-[1px] w-12 bg-gold/50"></div>
                            <span class="block font-cinzel text-gold text-lg md:text-xl tracking-[0.4em]">01</span>
                            <div class="h-[1px] w-12 bg-gold/50"></div>
                        </div>
                        <h2 class="font-cinzel text-4xl md:text-6xl text-white font-bold tracking-widest uppercase mb-6 drop-shadow-lg">
                            ${section.title[currentLang]}
                        </h2>
                        <p class="font-rajdhani text-lg md:text-xl max-w-2xl mx-auto text-gray-300 font-light">
                            ${section.desc[currentLang]}
                        </p>
                    </div>
                    <div class="max-w-4xl mx-auto flex flex-col">
                        ${section.items.map(item => renderItem(item, true)).join('')}
                    </div>
                </section>
                `;
            }

            let contentHTML = '';
            if(section.isSplit) {
                contentHTML = `
                <div class="space-y-20">
                    <div>
                        <h3 class="text-center font-cinzel text-2xl text-gold mb-12 tracking-widest">${UI_TEXT.uramaki_title[currentLang]}</h3>
                        <div class="flex flex-col">
                            ${section.items.map(item => renderItem(item, false)).join('')}
                        </div>
                    </div>
                    <div>
                        <h3 class="text-center font-cinzel text-2xl text-gold mb-12 tracking-widest">${UI_TEXT.tempura_title[currentLang]}</h3>
                        <div class="flex flex-col">
                            ${section.itemsRight ? section.itemsRight.map(item => renderItem(item, false)).join('') : ''}
                        </div>
                    </div>
                </div>`;
            } else {
                contentHTML = `<div class="flex flex-col">${section.items.map(item => renderItem(item, false)).join('')}</div>`;
            }

            return `
            <section id="${section.id}" class="mb-0 w-full bg-white relative">
                <div class="w-full h-[60svh] md:h-[80svh] relative flex items-center justify-center overflow-hidden bg-ink">
                    <div class="absolute inset-0 z-20"></div>
                    ${section.img ? `<div class="absolute inset-0 parallax-bg" style="background-image: url('${section.img}')"></div>` : `<div class="absolute inset-0 bg-gradient-to-b from-ink via-[#1a1a1a] to-ink"></div>`}
                    <div class="absolute inset-0 bg-black/40 pointer-events-none"></div>
                    
                    <div class="relative z-30 text-center text-white px-4">
                        <span class="block font-cinzel text-gold text-lg md:text-xl tracking-[0.4em] mb-4">${idx < 9 ? '0' : ''}${idx + 1}</span>
                        <h2 class="font-cinzel text-5xl md:text-8xl font-bold tracking-widest uppercase mb-6 drop-shadow-lg">
                            ${section.title[currentLang]}
                        </h2>
                        <p class="font-rajdhani text-lg md:text-2xl max-w-2xl mx-auto text-gray-200 font-light">
                            ${section.desc[currentLang]}
                        </p>
                    </div>
                </div>

                <div class="max-w-5xl mx-auto px-6 py-20 md:py-32 bg-white relative -mt-10 rounded-t-3xl shadow-[0_-20px_60px_-15px_rgba(0,0,0,0.1)] z-20">
                    ${contentHTML}
                </div>
            </section>
            `;
        }).join('');

        const infoHTML = `
          <div class="bg-alabaster border-t border-gray-200 py-16 px-6 relative z-30">
              <div class="max-w-3xl mx-auto text-center">
                  <h4 class="font-cinzel text-gold-dark text-lg mb-4 tracking-widest uppercase">
                      ${ALLERGIES.title[currentLang]}
                  </h4>
                  <p class="font-rajdhani text-gray-600 text-sm leading-7 mb-8">
                      ${ALLERGIES.text[currentLang]}
                  </p>
              </div>
          </div>
        `;
      
        main.innerHTML = sectionsHTML + infoHTML;
    }
    })();
  </script>
